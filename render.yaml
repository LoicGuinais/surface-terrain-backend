services:
  - type: web
    name: surface-terrain-backend
    env: docker
    plan: free
    dockerfilePath: Dockerfile
    autoDeploy: true
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SEARCH_TRACKING_IP_SALT
        sync: false
